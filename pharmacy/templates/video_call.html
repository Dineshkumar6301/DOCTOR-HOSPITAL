{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Video Consultation</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        body { margin:0; padding:0; }
        #jitsi-container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
   <div id="jitsi-container" style="height: 600px; width: 100%;"></div>

<script>
    // Define the Jitsi domain
    const domain = "jitsi.riot.im";

    // Define the room name dynamically using Django template syntax
    const roomName = "ClinicApp_{{ appointment.id }}";

    // Define user display name
    const displayName = "{{ request.user.get_full_name|default:request.user.username }}";

    // Define Jitsi options
    const options = {
        roomName: roomName,
        parentNode: document.querySelector('#jitsi-container'),
        width: "100%",
        height: 600,
        userInfo: {
            displayName: displayName
        },
        configOverwrite: {
            prejoinPageEnabled: false,
            disableChat: false,
            startWithAudioMuted: true,
            startWithVideoMuted: false,
            enableWelcomePage: false
        },
        interfaceConfigOverwrite: {
            TOOLBAR_BUTTONS: [
                'microphone', 'camera', 'hangup', 'chat', 'tileview', 'fullscreen',
                'toggle-audio', 'mute-everyone'
            ]
        }
    };

    // Initialize the Jitsi Meet API
    const api = new JitsiMeetExternalAPI(domain, options);

    // Set the meeting subject
    api.executeCommand('subject', 'Clinic Video Consultation');

    // Ensure mute is triggered after joining
    api.addEventListener('videoConferenceJoined', () => {
        api.executeCommand('toggleAudio'); // Mute on join
    });

    // Optional: Handle mute/unmute events
    api.addEventListener('audioMuteStatusChanged', (event) => {
        console.log("Audio mute status:", event.muted);
    });

    // Adjust size on window resize
    window.addEventListener('resize', () => {
        api.resize(container.offsetWidth, window.innerHeight);
        });
      api.addEventListener('readyToClose', () => {
        window.location.href = "{% url 'home' %}";  // Django URL for home
    });
</script>
</body>
</html>
